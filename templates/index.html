<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sillage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            display: ['"Outfit"', 'system-ui', 'sans-serif'],
          },
          colors: {
            ink: { 950: '#0a0a0f', 900: '#12121a', 800: '#1a1a26', 700: '#252532' },
            mist: { 400: '#9ca3b8', 300: '#b8c0d4', 200: '#d4dae8' },
            accent: { DEFAULT: '#a78bfa', dim: '#7c3aed' },
          },
          boxShadow: {
            glow: '0 0 40px -10px rgba(167, 139, 250, 0.35)',
            card: '0 4px 24px rgba(0,0,0,0.45)',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-ink-950 bg-[radial-gradient(ellipse_120%_80%_at_50%_-20%,rgba(124,58,237,0.18),transparent)] text-mist-200 antialiased">
  <div class="mx-auto max-w-3xl px-4 pb-24 pt-12 sm:px-6 sm:pt-16">
    <!-- Header -->
    <header class="mb-10 text-center">
      <h1 class="font-display text-4xl font-bold tracking-tight text-white sm:text-5xl">
        Sillage
      </h1>
      <p class="mt-3 text-sm text-mist-400 sm:text-base">
        Describe your mood, an occasion, or a favorite note. I’ll find your perfect scent trail.
      </p>
    </header>

    <!-- Search -->
    <div class="mx-auto max-w-2xl space-y-6">
      <div class="relative shadow-glow rounded-2xl">
        <span class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-mist-400" aria-hidden="true">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input
          id="search-input"
          type="search"
          autocomplete="off"
          placeholder="Search by vibe (e.g., fresh summer) or perfume name..."
          class="w-full rounded-2xl border border-ink-700 bg-ink-900 py-4 pl-12 pr-28 text-base text-white placeholder:text-mist-400 outline-none ring-accent/0 transition focus:border-accent/50 focus:ring-2 focus:ring-accent/25"
          aria-label="Search perfumes"
        />
        <button
          type="button"
          id="search-btn"
          class="absolute right-2 top-1/2 -translate-y-1/2 rounded-xl bg-accent px-4 py-2 text-sm font-semibold text-ink-950 transition hover:bg-violet-400 active:scale-[0.98]"
        >
          Search
        </button>
      </div>

      <!-- Gender filter -->
      <fieldset class="flex flex-wrap items-center justify-center gap-3">
        <legend class="sr-only">Gender filter</legend>
        <span class="text-xs font-medium uppercase tracking-wider text-mist-400">Gender</span>
        <div class="inline-flex rounded-xl border border-ink-700 bg-ink-900 p-1" role="group" aria-label="Gender toggle">
          <button type="button" data-gender="men" class="gender-btn rounded-lg px-4 py-2 text-sm font-medium text-mist-300 transition hover:text-white">
            Men
          </button>
          <button type="button" data-gender="women" class="gender-btn rounded-lg px-4 py-2 text-sm font-medium text-mist-300 transition hover:text-white">
            Women
          </button>
          <button type="button" data-gender="both" class="gender-btn rounded-lg px-4 py-2 text-sm font-medium text-mist-300 transition hover:text-white">
            Both
          </button>
        </div>
      </fieldset>
    </div>

    <!-- Status -->
    <div id="status" class="mt-8 hidden text-center text-sm text-mist-400" role="status" aria-live="polite"></div>

    <!-- Results -->
    <div id="results" class="mt-8 space-y-4" aria-live="polite"></div>

    <!-- Load more -->
    <div id="load-more-wrap" class="mt-10 hidden flex justify-center">
      <button
        type="button"
        id="load-more-btn"
        class="rounded-xl border border-ink-700 bg-ink-800 px-8 py-3 text-sm font-semibold text-mist-200 transition hover:border-accent/40 hover:bg-ink-700 hover:text-white"
      >
        Load 5 More
      </button>
    </div>
  </div>

  <!-- Perfume bottle icon (hidden template for JS clone) -->
  <template id="bottle-icon">
    <svg class="h-12 w-10 shrink-0 text-accent/90" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M14 4h12v6l-2 2v4h-8v-4l-2-2V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
      <path d="M12 16h16l2 6c0 12-4 20-10 22-6-2-10-10-10-22l2-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
      <path d="M16 24h8" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5" />
    </svg>
  </template>

  <script>
    (function () {
      const input = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const resultsEl = document.getElementById('results');
      const statusEl = document.getElementById('status');
      const loadMoreWrap = document.getElementById('load-more-wrap');
      const loadMoreBtn = document.getElementById('load-more-btn');
      const genderBtns = document.querySelectorAll('.gender-btn');
      const bottleTemplate = document.getElementById('bottle-icon');

      let selectedGender = 'both';
      let limit = 5;
      let debounceId = null;
      const DEBOUNCE_MS = 320;

      function setGenderUI() {
        genderBtns.forEach((btn) => {
          const on = btn.dataset.gender === selectedGender;
          btn.classList.toggle('bg-accent', on);
          btn.classList.toggle('text-ink-950', on);
          btn.classList.toggle('font-semibold', on);
          btn.classList.toggle('shadow-sm', on);
          btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
      }

      genderBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          selectedGender = btn.dataset.gender;
          limit = 5;
          setGenderUI();
          runSearch();
        });
      });
      setGenderUI();

      function showStatus(msg, isError) {
        if (!msg) {
          statusEl.classList.add('hidden');
          statusEl.textContent = '';
          return;
        }
        statusEl.textContent = msg;
        statusEl.classList.remove('hidden');
        statusEl.classList.toggle('text-red-400', !!isError);
        statusEl.classList.toggle('text-mist-400', !isError);
      }

      function buildSearchURL() {
        const q = input.value.trim();
        const params = new URLSearchParams();
        params.set('query', q);
        params.set('limit', String(limit));
        if (selectedGender === 'men') params.set('gender', 'Man');
        else if (selectedGender === 'women') params.set('gender', 'Women');
        return '/search?' + params.toString();
      }

      function cloneBottle() {
        return bottleTemplate.content.cloneNode(true);
      }

      function renderResults(data) {
        resultsEl.innerHTML = '';
        const items = data.results || [];

        if (!input.value.trim()) {
          loadMoreWrap.classList.add('hidden');
          return;
        }

        if (items.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'text-center text-mist-400 py-12';
          empty.textContent = 'No matches yet — try another vibe or name.';
          resultsEl.appendChild(empty);
          loadMoreWrap.classList.add('hidden');
          return;
        }

        const canLoadMore = items.length > 0 && items.length === data.limit && data.limit < 100;

        items.forEach((r) => {
          const card = document.createElement('article');
          card.className =
            'flex gap-4 rounded-2xl border border-ink-700 bg-ink-900/80 p-4 shadow-card backdrop-blur-sm transition hover:border-accent/30';

          const iconWrap = document.createElement('div');
          iconWrap.className = 'flex items-start pt-1';
          iconWrap.appendChild(cloneBottle());
          card.appendChild(iconWrap);

          const body = document.createElement('div');
          body.className = 'min-w-0 flex-1';

          const name = document.createElement('a');
          name.href = r.image_search_url || '#';
          name.target = '_blank';
          name.rel = 'noopener noreferrer';
          name.className =
            'font-display text-lg font-semibold text-white hover:text-accent transition break-words';
          name.textContent = r.perfume_name || 'Unknown';
          body.appendChild(name);

          const meta = document.createElement('p');
          meta.className = 'mt-1 text-sm text-mist-400';
          const brand = (r.brand && String(r.brand) !== 'nan') ? r.brand : '—';
          const season = r.season || '—';
          meta.textContent = brand + ' · ' + season;
          body.appendChild(meta);

          if (r.similarity != null) {
            const sim = document.createElement('p');
            sim.className = 'mt-2 text-xs text-mist-500';
            sim.textContent = 'Match score: ' + Number(r.similarity).toFixed(3);
            body.appendChild(sim);
          }

          card.appendChild(body);
          resultsEl.appendChild(card);
        });

        if (canLoadMore) loadMoreWrap.classList.remove('hidden');
        else loadMoreWrap.classList.add('hidden');
      }

      async function runSearch() {
        const q = input.value.trim();
        if (!q) {
          showStatus('');
          resultsEl.innerHTML = '';
          loadMoreWrap.classList.add('hidden');
          return;
        }

        showStatus('Searching…');
        try {
          const res = await fetch(buildSearchURL());
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || 'Search failed');
          }
          showStatus('');
          renderResults(data);
        } catch (e) {
          showStatus(e.message || 'Something went wrong.', true);
          resultsEl.innerHTML = '';
          loadMoreWrap.classList.add('hidden');
        }
      }

      function scheduleSearch() {
        limit = 5;
        clearTimeout(debounceId);
        debounceId = setTimeout(runSearch, DEBOUNCE_MS);
      }

      input.addEventListener('input', scheduleSearch);
      searchBtn.addEventListener('click', () => {
        limit = 5;
        clearTimeout(debounceId);
        runSearch();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          limit = 5;
          clearTimeout(debounceId);
          runSearch();
        }
      });

      loadMoreBtn.addEventListener('click', () => {
        limit += 5;
        runSearch();
      });
    })();
  </script>
</body>
</html>
